<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício08</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .menu{
            background-color: hotpink;
            height: 100px;
            width: 100%;
        }
        .esquerda{
            background-color: lightpink;
            height: 400px;
            width: 460px;
            float: left;
            margin: 20px;
        }
        .meio{
            background-color: rgb(182, 227, 255);
            height: 400px;
            width: 456px;
            float: left;
            margin: 20px;
        }
        .direita{
            background-color: rgb(215, 182, 255);
            height: 400px;
            width: 460px;
            float: left;
            margin: 20px;
        }
        .roda{
            background-color: deeppink;
            height: 60px;
            width: 100%;
        }
        .clear{
            clear:both;
        }
    </style>
</head>
<body>
    <header>
        <div class="menu">
            MENU
        </div>
    </header>
    <main>
        <div>
            <div class="esquerda">
                ESQUERDA
            </div>
            <div class="meio">
                MEIO
            </div>
            <div class="direita">
                DIREITA
            </div>
            <div class="clear"></div>
        </div>
    </main>
    <footer>
        <div class="roda">
            RODAPÉ
        </div>
    </footer>
</body>
</html>
