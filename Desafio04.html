<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
            *{
                margin: 0 auto;
                padding: 0;
            }
        .menu{
            background-color: rgb(255, 249, 237);
            width: 100%;
            height: 40px;
        }
        .menu ul{
            padding: 0;
            max-width: 500px;
        }
        .menu ul li{          
            background-color: rgb(191, 243, 255);
            color: rgb(0, 0, 0);
            float: left;
            width: 100px;
            height: 40px;
            display: inline-block;
            text-align: center;
            line-height: 40px;
            position: relative;
        }
        .menu ul li:hover{
            background-color:rgb(129, 251, 255); 
        }
        
        .menu ul ul{
            display: none;
        }
        .menu ul li:hover > ul{
            display: block;
        }
        
        .menu ul ul ul{
            margin-left: 102px;
            position: absolute;
            top: 0px;
        }
        .menu ul ul li:hover{
            background-color:#fbc9de; 
        }
        .menu ul ul ul li:hover{
            background-color:rgb(255, 198, 226); 
        }
    </style>
</head>
<body>
    <header>
    <nav class="menu">
        <ul>
            <li>Norte</li>
            <li>Maçã</li>
               
            <li>Abacate
                <ul>
                    <li>Avocado</li>
                    <li>Nacional</li>
                    <li>Importado
                    </li>
                </ul>
            </li>
            <li>Abacaxi
            </li>
    </nav>
</header>

</body>
</html>
